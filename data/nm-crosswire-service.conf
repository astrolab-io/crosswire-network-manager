<?xml version="1.0" encoding="UTF-8"?> <!-- -*- XML -*- -->
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own and be reached at the service name; NM runs as root. -->
  <policy user="root">
    <allow own="org.freedesktop.NetworkManager.crosswire"/>
    <allow send_destination="org.freedesktop.NetworkManager.crosswire"/>
    <allow send_interface="org.freedesktop.NetworkManager.VPN.Plugin"/>
  </policy>
  <policy context="default">
    <deny own="org.freedesktop.NetworkManager.crosswire"/>
    <deny send_destination="org.freedesktop.NetworkManager.crosswire"/>
  </policy>
</busconfig>
