# SPDX-License-Identifier: GPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build pkg-config gcc \
            libnm-dev libglib2.0-dev libgtk-3-dev libgtk-4-dev ppp-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: service

      # --- Rust service: format, lint, test ---
      - name: Service fmt
        run: cargo fmt --manifest-path service/Cargo.toml --check
      - name: Service clippy
        run: cargo clippy --manifest-path service/Cargo.toml --all-targets -- -D warnings
      - name: Service test
        run: cargo test --manifest-path service/Cargo.toml

      # --- Full meson build: C editor + pppd plugin + service ---
      - name: Meson setup
        run: |
          meson setup build \
            -Dpppd_include=/usr/include \
            -Dpppd_plugin_dir=$(ls -d /usr/lib/pppd/* | head -n1)
      - name: Meson compile
        run: meson compile -C build
      - name: Meson test
        run: meson test -C build --print-errorlogs
